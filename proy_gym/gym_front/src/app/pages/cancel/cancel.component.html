<app-navbar></app-navbar>

<div class="min-h-screen bg-surface-container-low flex items-center justify-center py-20 px-6" id="main-content">
  <div class="max-w-3xl w-full mx-auto flex flex-col gap-6">

    <div class="bg-surface-container-lowest rounded-xl shadow overflow-hidden border border-outline-variant p-8 md:p-12 text-center hover:-translate-y-1 hover:shadow-lg transition-all duration-300" role="alert">
      <i class="bi bi-x-circle-fill text-6xl text-error mb-6" aria-hidden="true"></i>
      <h1 class="text-headline-md font-headline-md text-primary-container mb-4">Pago Cancelado</h1>
      <p class="text-body-md text-on-surface-variant mb-2">
        El proceso de pago ha sido cancelado. Tu membresia no ha sido procesada.
      </p>
      <p class="text-body-md text-outline mb-8">
        Si tienes alguna duda o problema, no dudes en contactarnos.
      </p>

      <div class="flex flex-col sm:flex-row justify-center gap-4">
        <button type="button" (click)="goToPayment()"
                class="flex items-center justify-center gap-2 bg-gradient-to-r from-primary-container to-on-tertiary-fixed-variant text-on-primary px-6 py-3 rounded-lg uppercase font-bold text-sm tracking-wider shadow-sm hover:shadow-md hover:-translate-y-0.5 transition-all"
                aria-label="Intentar el pago de nuevo">
          <i class="bi bi-credit-card"></i> Intentar de nuevo
        </button>
        <button type="button" (click)="goToPlans()"
                class="flex items-center justify-center gap-2 border-2 border-primary-container text-primary-container bg-transparent px-6 py-3 rounded-lg uppercase font-bold text-sm tracking-wider hover:bg-surface-container-low hover:-translate-y-0.5 transition-all"
                aria-label="Ver planes disponibles">
          <i class="bi bi-arrow-left"></i> Ver planes
        </button>
        <button type="button" (click)="goToHome()"
                class="flex items-center justify-center gap-2 border border-outline-variant text-on-surface-variant bg-transparent px-6 py-3 rounded-lg uppercase font-bold text-sm tracking-wider hover:bg-surface-container hover:-translate-y-0.5 transition-all"
                aria-label="Volver al inicio">
          <i class="bi bi-house"></i> Inicio
        </button>
      </div>
    </div>

    <div class="bg-surface-container-lowest rounded-xl shadow overflow-hidden border border-outline-variant p-6 hover:shadow-lg transition-all">
      <div class="flex items-center gap-3 mb-4">
        <i class="bi bi-info-circle text-secondary text-xl"></i>
        <h2 class="text-headline-md font-headline-md text-primary-container">Necesitas ayuda?</h2>
      </div>
      <div class="flex flex-col sm:flex-row gap-6 text-on-surface-variant text-body-md">
        <div class="flex items-center gap-2">
          <i class="bi bi-envelope text-secondary text-sm"></i>
          <a href="mailto:contacto&#64;gym.com" class="hover:text-secondary transition-colors">contacto&#64;gym.com</a>
        </div>
        <div class="flex items-center gap-2">
          <i class="bi bi-telephone text-secondary text-sm"></i>
          <span>+51 1 234 5678</span>
        </div>
      </div>
    </div>

  </div>
</div>
